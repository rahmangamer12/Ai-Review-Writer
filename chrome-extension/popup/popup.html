<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoReview AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .platform-google { background: #4285f4; }
    .platform-facebook { background: #1877f2; }
    .platform-yelp { background: #ff1a1a; }
    .platform-other { background: #6b7280; }

    .detected-review {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .reviewer-name {
      font-weight: 600;
      font-size: 14px;
    }

    .review-rating {
      color: #fbbf24;
      font-size: 14px;
    }

    .review-text {
      font-size: 13px;
      line-height: 1.5;
      color: #cbd5e1;
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }

    .ai-reply-box {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #e2e8f0;
    }

    .ai-reply-box:empty {
      display: none;
    }

    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-row:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-size: 13px;
      color: #cbd5e1;
    }

    select, input {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      padding: 6px 10px;
      color: white;
      font-size: 13px;
    }

    select option {
      background: #1a1a2e;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      transition: 0.3s;
    }

    .toggle-slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 10px;
      display: none;
    }

    .error-message.active {
      display: block;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 11px;
      color: #64748b;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>✨ AutoReview AI</h1>
    <p>AI-Powered Review Replies</p>
  </div>

  <div class="content">
    <div class="error-message" id="errorMessage"></div>

    <!-- Detected Platform -->
    <div class="section">
      <div class="section-title">Detected Platform</div>
      <div id="platformContainer">
        <span class="platform-badge platform-other">Open a review page</span>
      </div>
    </div>

    <!-- Detected Review -->
    <div class="section" id="reviewSection" style="display: none;">
      <div class="section-title">Detected Review</div>
      <div class="detected-review">
        <div class="review-header">
          <span class="reviewer-name" id="reviewerName">-</span>
          <span class="review-rating" id="reviewRating">-</span>
        </div>
        <div class="review-text" id="reviewText">-</div>
      </div>
    </div>

    <!-- Settings -->
    <div class="section">
      <div class="section-title">Reply Settings</div>
      <div class="settings-row">
        <span class="settings-label">Tone</span>
        <select id="toneSelect">
          <option value="friendly">Friendly</option>
          <option value="professional">Professional</option>
          <option value="apologetic">Apologetic</option>
          <option value="enthusiastic">Enthusiastic</option>
          <option value="desi">Desi Style</option>
        </select>
      </div>
      <div class="settings-row">
        <span class="settings-label">Language</span>
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="ur">Urdu</option>
          <option value="roman-urdu">Roman Urdu</option>
          <option value="hi">Hindi</option>
          <option value="ar">Arabic</option>
          <option value="es">Spanish</option>
        </select>
      </div>
      <div class="settings-row">
        <span class="settings-label">Auto-copy to clipboard</span>
        <label class="toggle">
          <input type="checkbox" id="autoCopy" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Generating AI reply...</p>
    </div>

    <!-- AI Reply -->
    <div class="section" id="replySection" style="display: none;">
      <div class="section-title">AI Generated Reply</div>
      <div class="ai-reply-box" id="aiReply"></div>
      <div style="margin-top: 10px;">
        <button class="btn btn-secondary" id="regenerateBtn">🔄 Regenerate</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="section" id="actionSection">
      <button class="btn btn-primary" id="generateBtn" disabled>
        🔍 Detect Reviews on Page
      </button>
    </div>
  </div>

  <div class="footer">
    Powered by <a href="https://autoreview-ai.com" target="_blank">AutoReview AI</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
