<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subway Surfers 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
  #gameCanvas { display: block; width: 100vw; height: 100vh; }

  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

  #hud {
    position: absolute; top: 20px; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 24px;
  }
  #scoreBox {
    background: linear-gradient(135deg, rgba(255,200,0,0.92), rgba(255,120,0,0.85));
    border: 3px solid #fff;
    border-radius: 18px;
    padding: 10px 22px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(255,180,0,0.5);
  }
  #scoreLabel { color: #fff; font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
  #scoreVal { color: #fff; font-size: 32px; font-weight: 900; line-height: 1; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  #highBox { background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.3); border-radius: 14px; padding: 8px 18px; text-align: center; }
  #highLabel { color: #aaa; font-size: 10px; letter-spacing: 2px; }
  #highVal { color: #ffd700; font-size: 20px; font-weight: 900; }

  #coinBox {
    background: linear-gradient(135deg, rgba(255,220,0,0.92), rgba(255,160,0,0.85));
    border: 3px solid #fff;
    border-radius: 18px;
    padding: 10px 22px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 24px rgba(255,200,0,0.4);
  }
  #coinIcon { font-size: 24px; }
  #coinVal { color: #fff; font-size: 28px; font-weight: 900; text-shadow: 1px 1px 0 rgba(0,0,0,0.3); }

  #multiplierBadge {
    position: absolute; top: 110px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #ff4500, #ff0080);
    color: #fff; font-size: 22px; font-weight: 900;
    padding: 6px 24px; border-radius: 30px;
    border: 3px solid #fff;
    box-shadow: 0 4px 20px rgba(255,50,0,0.6);
    opacity: 0; transition: opacity 0.3s;
  }

  #powerupBar {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 10px;
  }
  .powerupIcon {
    background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.5);
    border-radius: 12px; padding: 8px 14px; color: #fff; font-size: 20px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    opacity: 0; transition: opacity 0.3s;
  }
  .powerupIcon.active { opacity: 1; border-color: #ffd700; }
  .powerupTimer { font-size: 10px; color: #ffd700; font-weight: 900; }

  #mobileControls {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 200px;
    display: none; pointer-events: all;
  }

  /* SCREENS */
  .screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; pointer-events: all;
    transition: opacity 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  #startScreen {
    background: linear-gradient(180deg, rgba(30,0,80,0.95) 0%, rgba(0,0,0,0.97) 100%);
  }
  .gameLogo {
    font-size: clamp(48px, 10vw, 96px);
    font-weight: 900;
    background: linear-gradient(135deg, #ffd700, #ff8c00, #ff4500);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-shadow: none;
    letter-spacing: -2px;
    line-height: 1;
    filter: drop-shadow(0 4px 20px rgba(255,150,0,0.6));
    animation: logoPulse 2s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100% { filter: drop-shadow(0 4px 20px rgba(255,150,0,0.6)); transform: scale(1); }
    50% { filter: drop-shadow(0 4px 40px rgba(255,200,0,0.9)); transform: scale(1.03); }
  }
  .logoSub { color: rgba(255,255,255,0.7); font-size: 16px; letter-spacing: 6px; margin-top: 8px; }

  .bigBtn {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #1a0000; font-size: 22px; font-weight: 900;
    padding: 18px 60px; border-radius: 50px;
    border: none; cursor: pointer; margin-top: 40px;
    letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 8px 30px rgba(255,150,0,0.5), 0 2px 0 rgba(0,0,0,0.3);
    transition: all 0.15s;
    pointer-events: all;
  }
  .bigBtn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 12px 40px rgba(255,150,0,0.7); }
  .bigBtn:active { transform: scale(0.97); }

  .controlsHint {
    color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 30px;
    text-align: center; line-height: 1.8;
  }
  .controlsHint span { color: rgba(255,220,0,0.8); font-weight: 700; }

  #gameoverScreen {
    background: linear-gradient(180deg, rgba(80,0,0,0.97) 0%, rgba(0,0,0,0.99) 100%);
  }
  .overTitle {
    font-size: clamp(36px, 8vw, 72px); font-weight: 900;
    color: #fff; letter-spacing: -1px;
    text-shadow: 0 4px 20px rgba(255,0,0,0.5);
  }
  .overScore { color: #ffd700; font-size: 28px; font-weight: 900; margin-top: 10px; }
  .overHigh { color: rgba(255,255,255,0.6); font-size: 16px; margin-top: 6px; }

  /* FLOATING SCORE POPUPS */
  .popup {
    position: fixed; font-size: 28px; font-weight: 900;
    color: #ffd700; pointer-events: none; z-index: 200;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    animation: popupFloat 1s ease-out forwards;
  }
  @keyframes popupFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
  }

  /* DISTANCE BAR */
  #distanceBar {
    position: absolute; top: 110px; left: 24px;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 6px 14px;
    color: #fff; font-size: 14px; font-weight: 700;
  }

  /* SPEED INDICATOR */
  #speedIndicator {
    position: absolute; bottom: 20px; right: 24px;
    color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 700;
    letter-spacing: 2px;
  }

  /* TOUCH ZONES (invisible) */
  #touchLeft, #touchRight, #touchUp, #touchDown {
    position: absolute; pointer-events: all;
  }
  #touchLeft { left: 0; top: 0; width: 33%; height: 100%; }
  #touchRight { right: 0; top: 0; width: 33%; height: 100%; }
  #touchUp { left: 33%; top: 0; width: 34%; height: 50%; }
  #touchDown { left: 33%; bottom: 0; width: 34%; height: 50%; }

  /* NEW HIGH SCORE FLASH */
  #newHigh {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #ffd700; font-size: 36px; font-weight: 900;
    text-shadow: 0 0 30px rgba(255,200,0,0.8);
    opacity: 0; pointer-events: none;
    animation: none;
  }
  @keyframes highFlash {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="ui">
  <!-- HUD -->
  <div id="hud">
    <div>
      <div id="scoreBox">
        <div id="scoreLabel">Score</div>
        <div id="scoreVal">0</div>
      </div>
      <div id="distanceBar">📏 0m</div>
    </div>
    <div id="highBox">
      <div id="highLabel">BEST</div>
      <div id="highVal">0</div>
    </div>
    <div id="coinBox">
      <div id="coinIcon">🪙</div>
      <div id="coinVal">0</div>
    </div>
  </div>

  <div id="multiplierBadge">x2 MULTIPLIER!</div>
  <div id="newHigh">🏆 NEW BEST!</div>

  <div id="powerupBar">
    <div class="powerupIcon" id="puMagnet">🧲<span class="powerupTimer" id="magnetTimer">5</span></div>
    <div class="powerupIcon" id="puJetpack">🚀<span class="powerupTimer" id="jetpackTimer">5</span></div>
    <div class="powerupIcon" id="puShield">🛡️<span class="powerupTimer" id="shieldTimer">5</span></div>
    <div class="powerupIcon" id="puX2">✖️2<span class="powerupTimer" id="x2Timer">5</span></div>
  </div>

  <div id="speedIndicator">SPEED: 1x</div>

  <!-- Touch zones -->
  <div id="touchLeft"></div>
  <div id="touchRight"></div>
  <div id="touchUp"></div>
  <div id="touchDown"></div>
</div>

<!-- START SCREEN -->
<div class="screen" id="startScreen">
  <div class="gameLogo">SUBWAY<br>SURFERS</div>
  <div class="logoSub">3D EDITION</div>
  <button class="bigBtn" id="startBtn">TAP TO RUN!</button>
  <div class="controlsHint">
    <span>← →</span> Lane Change &nbsp;|&nbsp; <span>↑</span> Jump &nbsp;|&nbsp; <span>↓</span> Roll<br>
    <span>A D</span> Lane &nbsp;|&nbsp; <span>W</span> Jump &nbsp;|&nbsp; <span>S</span> Roll<br>
    Swipe on mobile
  </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen hidden" id="gameoverScreen">
  <div class="overTitle">BUSTED!</div>
  <div class="overScore" id="overScoreVal">Score: 0</div>
  <div class="overHigh" id="overHighVal">Best: 0</div>
  <button class="bigBtn" id="restartBtn">RUN AGAIN!</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// SUBWAY SURFERS 3D - Full Game Engine
// ============================================================

const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a0a2e, 0.018);
scene.background = new THREE.Color(0x0a0520);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 5, 10);
camera.lookAt(0, 2, 0);

// ============================================================
// GAME STATE
// ============================================================
const STATE = {
  running: false,
  gameOver: false,
  score: 0,
  highScore: parseInt(localStorage.getItem('ss3d_high') || '0'),
  coins: 0,
  totalCoins: parseInt(localStorage.getItem('ss3d_coins') || '0'),
  distance: 0,
  speed: 14,
  baseSpeed: 14,
  maxSpeed: 38,
  speedMultiplier: 1,
  lane: 1,          // 0=left 1=center 2=right
  targetLaneX: 0,
  lanePositions: [-2.8, 0, 2.8],
  jumping: false,
  rolling: false,
  jumpVelocity: 0,
  playerY: 0,
  rollTimer: 0,
  jumpCount: 0,
  maxJumps: 2,
  invincible: false,
  invincibleTimer: 0,
  multiplier: 1,
  tilePool: [],
  obstaclePool: [],
  coinPool: [],
  powerupPool: [],
  activePowerups: { magnet: 0, jetpack: 0, shield: 0, x2: 0 },
  particles: [],
  shakeIntensity: 0,
  distanceTraveled: 0,
  lastSpeedIncrease: 0,
  combo: 0,
};

document.getElementById('highVal').textContent = STATE.highScore;

// ============================================================
// MATERIALS (reused for performance)
// ============================================================
const MAT = {
  track: new THREE.MeshLambertMaterial({ color: 0x555577 }),
  trackLine: new THREE.MeshLambertMaterial({ color: 0xffffaa }),
  ground: new THREE.MeshLambertMaterial({ color: 0x221133 }),
  building1: new THREE.MeshLambertMaterial({ color: 0x2244aa }),
  building2: new THREE.MeshLambertMaterial({ color: 0x334466 }),
  building3: new THREE.MeshLambertMaterial({ color: 0x442244 }),
  buildingWindow: new THREE.MeshLambertMaterial({ color: 0xffffcc, emissive: 0xffee88, emissiveIntensity: 0.6 }),
  trainBody: new THREE.MeshLambertMaterial({ color: 0xee2200 }),
  trainWindow: new THREE.MeshLambertMaterial({ color: 0x88ccff, emissive: 0x4488ff, emissiveIntensity: 0.3 }),
  obstacle: new THREE.MeshLambertMaterial({ color: 0xff4400 }),
  obstacleBarrier: new THREE.MeshLambertMaterial({ color: 0xffcc00 }),
  coin: new THREE.MeshLambertMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.4 }),
  player: new THREE.MeshLambertMaterial({ color: 0x00ccff }),
  playerBody: new THREE.MeshLambertMaterial({ color: 0x3355ff }),
  playerLegs: new THREE.MeshLambertMaterial({ color: 0x222244 }),
  shield: new THREE.MeshLambertMaterial({ color: 0x00ffff, transparent: true, opacity: 0.3, emissive: 0x00ffff, emissiveIntensity: 0.5 }),
  jetpackFlame: new THREE.MeshLambertMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.8 }),
  powerupMagnet: new THREE.MeshLambertMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.5 }),
  powerupJetpack: new THREE.MeshLambertMaterial({ color: 0x00ff88, emissive: 0x00ff44, emissiveIntensity: 0.5 }),
  powerupShield: new THREE.MeshLambertMaterial({ color: 0x00ccff, emissive: 0x0088ff, emissiveIntensity: 0.5 }),
  powerupX2: new THREE.MeshLambertMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 0.5 }),
  sky: new THREE.MeshLambertMaterial({ color: 0x1a0a40, side: THREE.BackSide }),
  rail: new THREE.MeshLambertMaterial({ color: 0x888888 }),
  pillar: new THREE.MeshLambertMaterial({ color: 0x777799 }),
  trashcan: new THREE.MeshLambertMaterial({ color: 0x336633 }),
  bench: new THREE.MeshLambertMaterial({ color: 0x884422 }),
  barrier: new THREE.MeshLambertMaterial({ color: 0xff8800, emissive: 0xff4400, emissiveIntensity: 0.2 }),
  barrierStripe: new THREE.MeshLambertMaterial({ color: 0x111111 }),
};

// ============================================================
// GEOMETRY CACHE
// ============================================================
const GEO = {
  box1: new THREE.BoxGeometry(1, 1, 1),
  sphere: new THREE.SphereGeometry(0.5, 8, 8),
  cylinder: new THREE.CylinderGeometry(0.5, 0.5, 1, 8),
  coin: new THREE.CylinderGeometry(0.3, 0.3, 0.12, 10),
  torus: new THREE.TorusGeometry(0.3, 0.1, 6, 12),
};

// ============================================================
// LIGHTING
// ============================================================
const ambientLight = new THREE.AmbientLight(0x221133, 0.8);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffd4aa, 1.5);
sunLight.position.set(5, 20, -10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 1024;
sunLight.shadow.mapSize.height = 1024;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 80;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x4466ff, 0.6);
fillLight.position.set(-5, 10, 5);
scene.add(fillLight);

const playerLight = new THREE.PointLight(0x00ccff, 1.5, 8);
playerLight.position.set(0, 3, 0);
scene.add(playerLight);

// Neon street lights along track
function createStreetLights() {
  for (let z = -10; z > -200; z -= 25) {
    const light = new THREE.PointLight(0xff8800, 0.8, 12);
    light.position.set(6, 6, z);
    scene.add(light);
    const light2 = new THREE.PointLight(0x8844ff, 0.5, 10);
    light2.position.set(-6, 6, z - 12);
    scene.add(light2);
  }
}
createStreetLights();

// ============================================================
// SKY / CITYSCAPE BACKDROP
// ============================================================
const skyGeo = new THREE.SphereGeometry(250, 16, 8);
const skyMat = new THREE.MeshBasicMaterial({
  color: 0x0a0520, side: THREE.BackSide,
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Stars
function createStars() {
  const starGeo = new THREE.BufferGeometry();
  const starCount = 800;
  const positions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 400;
    positions[i * 3 + 1] = Math.random() * 80 + 20;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 400;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.4, sizeAttenuation: true });
  scene.add(new THREE.Points(starGeo, starMat));
}
createStars();

// ============================================================
// PLAYER CHARACTER
// ============================================================
const playerGroup = new THREE.Group();
scene.add(playerGroup);

function buildPlayer() {
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), MAT.player);
  head.position.y = 1.55;
  head.castShadow = true;
  playerGroup.add(head);

  // Hair
  const hair = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.2, 0.52), new THREE.MeshLambertMaterial({ color: 0xffaa00 }));
  hair.position.y = 1.85;
  playerGroup.add(hair);

  // Eyes
  const eyeGeo = new THREE.BoxGeometry(0.1, 0.08, 0.1);
  const eyeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.12, 1.57, -0.26);
  playerGroup.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(0.12, 1.57, -0.26);
  playerGroup.add(eyeR);

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.65, 0.35), MAT.playerBody);
  body.position.y = 1.05;
  body.castShadow = true;
  playerGroup.add(body);

  // Jacket stripe
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.65, 0.37), new THREE.MeshLambertMaterial({ color: 0xff4400 }));
  stripe.position.y = 1.05;
  playerGroup.add(stripe);

  // Arms
  const armGeo = new THREE.BoxGeometry(0.18, 0.5, 0.18);
  const armMat = new THREE.MeshLambertMaterial({ color: 0x3355ff });
  const armL = new THREE.Mesh(armGeo, armMat);
  armL.position.set(-0.37, 1.05, 0);
  armL.castShadow = true;
  playerGroup.add(armL);
  const armR = new THREE.Mesh(armGeo, armMat);
  armR.position.set(0.37, 1.05, 0);
  armR.castShadow = true;
  playerGroup.add(armR);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.2, 0.5, 0.22);
  const legL = new THREE.Mesh(legGeo, MAT.playerLegs);
  legL.position.set(-0.15, 0.55, 0);
  legL.castShadow = true;
  playerGroup.add(legL);
  const legR = new THREE.Mesh(legGeo, MAT.playerLegs);
  legR.position.set(0.15, 0.55, 0);
  legR.castShadow = true;
  playerGroup.add(legR);

  // Shoes
  const shoeGeo = new THREE.BoxGeometry(0.22, 0.12, 0.32);
  const shoeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const shoeL = new THREE.Mesh(shoeGeo, shoeMat);
  shoeL.position.set(-0.15, 0.28, -0.05);
  playerGroup.add(shoeL);
  const shoeR = new THREE.Mesh(shoeGeo, shoeMat);
  shoeR.position.set(0.15, 0.28, -0.05);
  playerGroup.add(shoeR);

  // Skateboard
  const board = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.08, 0.22), new THREE.MeshLambertMaterial({ color: 0xff6600 }));
  board.position.y = 0.18;
  board.castShadow = true;
  playerGroup.add(board);

  // Backpack
  const pack = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.4, 0.15), new THREE.MeshLambertMaterial({ color: 0xcc2244 }));
  pack.position.set(0, 1.1, 0.22);
  playerGroup.add(pack);

  // Store refs for animation
  playerGroup.userData.head = head;
  playerGroup.userData.armL = armL;
  playerGroup.userData.armR = armR;
  playerGroup.userData.legL = legL;
  playerGroup.userData.legR = legR;
  playerGroup.userData.board = board;
  playerGroup.userData.hair = hair;
}
buildPlayer();

// Shield mesh
const shieldMesh = new THREE.Mesh(new THREE.SphereGeometry(1.2, 12, 8), MAT.shield.clone());
shieldMesh.visible = false;
playerGroup.add(shieldMesh);
playerGroup.userData.shield = shieldMesh;

// Jetpack
const jetpackMesh = new THREE.Group();
const jpBody = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.2), new THREE.MeshLambertMaterial({ color: 0x888888 }));
jpBody.position.set(0, 0, 0);
jetpackMesh.add(jpBody);
const flameL = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3, 6), MAT.jetpackFlame);
flameL.position.set(-0.1, -0.35, 0);
jetpackMesh.add(flameL);
const flameR = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.3, 6), MAT.jetpackFlame);
flameR.position.set(0.1, -0.35, 0);
jetpackMesh.add(flameR);
jetpackMesh.position.set(0, 1.1, 0.3);
jetpackMesh.visible = false;
playerGroup.add(jetpackMesh);
playerGroup.userData.jetpack = jetpackMesh;

playerGroup.position.set(0, 0, 2);

// ============================================================
// TRACK / TILE SYSTEM
// ============================================================
const TILE_LENGTH = 40;
const TILE_COUNT = 8;
const tiles = [];

function createTrackTile(zPos) {
  const group = new THREE.Group();
  group.position.z = zPos;

  // Main platform
  const platform = new THREE.Mesh(new THREE.BoxGeometry(10, 0.4, TILE_LENGTH), MAT.track);
  platform.position.y = -0.2;
  platform.receiveShadow = true;
  group.add(platform);

  // Ground / gutter
  const ground = new THREE.Mesh(new THREE.BoxGeometry(24, 0.1, TILE_LENGTH), MAT.ground);
  ground.position.y = -0.42;
  ground.receiveShadow = true;
  group.add(ground);

  // Lane dividers
  for (let i = -1; i <= 1; i += 2) {
    const divider = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, TILE_LENGTH), MAT.trackLine);
    divider.position.set(i * 1.4, 0.01, 0);
    group.add(divider);
  }

  // Edge lines
  for (let i = -1; i <= 1; i += 2) {
    const edge = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, TILE_LENGTH), new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0xaaaaff, emissiveIntensity: 0.3 }));
    edge.position.set(i * 4.9, 0.01, 0);
    group.add(edge);
  }

  // Rails (subway track underneath)
  for (let i = -1; i <= 1; i += 2) {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, TILE_LENGTH), MAT.rail);
    rail.position.set(i * 0.7, -0.38, 0);
    group.add(rail);
  }

  // Cross ties
  for (let z = -TILE_LENGTH / 2 + 2; z < TILE_LENGTH / 2; z += 3) {
    const tie = new THREE.Mesh(new THREE.BoxGeometry(2, 0.06, 0.25), new THREE.MeshLambertMaterial({ color: 0x442200 }));
    tie.position.set(0, -0.39, z);
    group.add(tie);
  }

  // Pillars holding overhead structure
  for (let z = -TILE_LENGTH / 2 + 5; z < TILE_LENGTH / 2; z += 15) {
    for (let x of [-5.5, 5.5]) {
      const pillar = new THREE.Mesh(new THREE.BoxGeometry(0.4, 8, 0.4), MAT.pillar);
      pillar.position.set(x, 4, z);
      group.add(pillar);
      // Beam top
      const beam = new THREE.Mesh(new THREE.BoxGeometry(12, 0.3, 0.5), MAT.pillar);
      beam.position.set(0, 8, z);
      group.add(beam);
    }
  }

  // Street lights
  for (let z = -TILE_LENGTH / 2 + 8; z < TILE_LENGTH / 2; z += 20) {
    for (let x of [-5.2, 5.2]) {
      // Pole
      const pole = new THREE.Mesh(new THREE.BoxGeometry(0.12, 4, 0.12), new THREE.MeshLambertMaterial({ color: 0x555555 }));
      pole.position.set(x, 2, z);
      group.add(pole);
      // Light head
      const head2 = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.3), new THREE.MeshLambertMaterial({ color: 0xffffaa, emissive: 0xffee88, emissiveIntensity: 1 }));
      head2.position.set(x, 4.1, z);
      group.add(head2);
    }
  }

  // Buildings (left and right sides)
  addBuildings(group, TILE_LENGTH);

  // Decorative elements
  addStreetProps(group, TILE_LENGTH);

  scene.add(group);
  tiles.push(group);
  return group;
}

function addBuildings(group, tileLen) {
  const buildingMats = [MAT.building1, MAT.building2, MAT.building3];

  for (let side of [-1, 1]) {
    let z = -tileLen / 2;
    while (z < tileLen / 2) {
      const w = 4 + Math.random() * 5;
      const h = 8 + Math.random() * 25;
      const d = 5 + Math.random() * 6;
      const mat = buildingMats[Math.floor(Math.random() * 3)];

      const building = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      const xPos = side * (7 + w / 2 + Math.random() * 2);
      building.position.set(xPos, h / 2 - 0.4, z + d / 2);
      building.castShadow = true;
      building.receiveShadow = true;
      group.add(building);

      // Windows
      addWindows(group, xPos, h, d, z, side, w);

      // Neon sign sometimes
      if (Math.random() < 0.3) {
        const neon = new THREE.Mesh(new THREE.BoxGeometry(w * 0.6, 0.3, 0.1),
          new THREE.MeshLambertMaterial({
            color: Math.random() < 0.5 ? 0xff00ff : 0x00ffff,
            emissive: Math.random() < 0.5 ? 0xff00ff : 0x00ffff,
            emissiveIntensity: 0.8
          }));
        neon.position.set(xPos, h * 0.7, z + d - 0.1);
        group.add(neon);
      }

      z += d + 0.5 + Math.random() * 2;
    }
  }
}

function addWindows(group, bx, bh, bd, bz, side, bw) {
  const rows = Math.floor(bh / 2.5);
  const cols = Math.floor(bw / 1.5);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.6) {
        const win = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.6, 0.08), MAT.buildingWindow);
        const wx = bx - bw / 2 + 0.75 + c * 1.5 + 0.37;
        const wy = 0.5 + r * 2.5;
        const wz = bz + bd - 0.05;
        if (side < 0) {
          win.position.set(wx, wy, wz);
        } else {
          win.position.set(wx, wy, wz);
        }
        group.add(win);
      }
    }
  }
}

function addStreetProps(group, tileLen) {
  for (let z = -tileLen / 2 + 5; z < tileLen / 2; z += 12 + Math.random() * 8) {
    // Trash can left side
    if (Math.random() < 0.5) {
      const can = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.18, 0.5, 8), MAT.trashcan);
      can.position.set(-5.8, 0.25, z);
      group.add(can);
    }
    // Bench right side
    if (Math.random() < 0.4) {
      const seatGeo = new THREE.BoxGeometry(1, 0.08, 0.4);
      const seat = new THREE.Mesh(seatGeo, MAT.bench);
      seat.position.set(5.5, 0.3, z + Math.random() * 4);
      group.add(seat);
    }
    // Poster/graffiti on wall texture (colored plane)
    if (Math.random() < 0.3) {
      const posterMat = new THREE.MeshLambertMaterial({
        color: [0xff4400, 0x00ff88, 0xff00aa, 0xffcc00][Math.floor(Math.random() * 4)],
        emissiveIntensity: 0.2
      });
      const poster = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), posterMat);
      poster.position.set(-6, 1.5, z);
      poster.rotation.y = Math.PI / 2;
      group.add(poster);
    }
  }
}

function createBarrierObstacle(lane) {
  const group = new THREE.Group();
  // Main barrier body (must jump over or move lane)
  const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.9, 0.4), MAT.barrier);
  body.position.y = 0.45;
  body.castShadow = true;
  group.add(body);
  // Stripes
  for (let i = 0; i < 3; i++) {
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.9, 0.42), MAT.barrierStripe);
    stripe.position.set(-0.9 + i * 0.9, 0.45, 0);
    group.add(stripe);
  }
  // Legs
  for (let s of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.5, 0.15), MAT.barrierStripe);
    leg.position.set(s * 1.1, 0.2, -0.2);
    group.add(leg);
  }
  group.userData = { type: 'barrier', lane, hitW: 2.2, hitH: 1.2, needsJump: true, canRoll: false };
  return group;
}

function createLowTrainObstacle(lane) {
  const group = new THREE.Group();
  // Train car that player must jump over
  const car = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.0, 2), MAT.trainBody);
  car.position.y = 0.5;
  car.castShadow = true;
  group.add(car);
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(2.52, 0.2, 2), new THREE.MeshLambertMaterial({ color: 0xffcc00 }));
  stripe.position.y = 0.7;
  group.add(stripe);
  // Warning light
  const light = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshLambertMaterial({ color: 0xff2200, emissive: 0xff0000, emissiveIntensity: 1 }));
  light.position.set(0, 1.1, -1.1);
  group.add(light);
  group.userData = { type: 'train_low', lane, hitW: 2.3, hitH: 1.1, needsJump: true, canRoll: false };
  return group;
}

function createHighTrainObstacle(lane) {
  const group = new THREE.Group();
  // High obstacle - must roll under
  const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.5, 1.5), MAT.trainBody);
  body.position.y = 2.0;
  body.castShadow = true;
  group.add(body);
  // Support legs
  for (let s of [-1, 1]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.2), MAT.rail);
    leg.position.set(s * 1.1, 0.7, 0);

  }
  group.userData = { type: 'train_high', lane, hitW: 2.3, hitH: 1.5, needsJump: false, canRoll: true, rollClearY: 1.0 };

}

function createFenceObstacle(lane) {
  const group = new THREE.Group();
  const postMat = new THREE.MeshLambertMaterial({ color: 0x886644 });
  const wireMat = new THREE.MeshLambertMaterial({ color: 0x999999 });
  for (let p = 0; p < 3; p++) {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.3, 0.12), postMat);
    post.position.set(-1 + p, 0.65, 0);
    post.castShadow = true;
    group.add(post);
  }
  for (let r = 0; r < 3; r++) {
    const wire = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.06, 0.06), wireMat);
    wire.position.set(0, 0.25 + r * 0.4, 0);
    group.add(wire);
  }
  group.userData = { type: 'fence', lane, hitW: 2.0, hitH: 1.3, needsJump: true, canRoll: false };
  return group;
}

function createBoxStackObstacle(lane) {
  const group = new THREE.Group();
  const count = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshLambertMaterial({
      color: [0x884400, 0x448800, 0x004488][i % 3]
    }));
    box.position.set((Math.random() - 0.5) * 0.4, 0.4 + i * 0.8, 0);
    box.castShadow = true;
    group.add(box);
  }
  const h = count * 0.8;
  group.userData = { type: 'box_stack', lane, hitW: 1.0, hitH: h, needsJump: h > 1.4, canRoll: h <= 1.4 };
  return group;
}

function createConeObstacle(lane) {
  const group = new THREE.Group();
  const positions = lane === 1 ? [-0.8, 0, 0.8] : [-0.6, 0.6];
  positions.forEach(x => {
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.7, 8), new THREE.MeshLambertMaterial({ color: 0xff6600 }));
    cone.position.set(x, 0.35, 0);
    group.add(cone);
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.06, 8), new THREE.MeshLambertMaterial({ color: 0xffffff }));
    base.position.set(x, 0.03, 0);
    group.add(base);
  });
  group.userData = { type: 'cone', lane, hitW: 0.8, hitH: 0.7, needsJump: false, canRoll: false, mustSidestep: true };
  return group;
}

function spawnObstacle() {
  // Pick lanes to block - sometimes 1, sometimes 2
  const blockedCount = Math.random() < 0.3 ? 2 : 1;
  const shuffledLanes = [0, 1, 2].sort(() => Math.random() - 0.5);
  const blockedLanes = shuffledLanes.slice(0, blockedCount);

  blockedLanes.forEach(lane => {
    const types = ['barrier', 'train_low', 'train_high', 'fence', 'box_stack', 'cone'];
    const type = types[Math.floor(Math.random() * types.length)];

    let obs;
    switch (type) {
      case 'barrier': obs = createBarrierObstacle(lane); break;
      case 'train_low': obs = createLowTrainObstacle(lane); break;
      case 'train_high': obs = createHighTrainObstacle(lane); break;
      case 'fence': obs = createFenceObstacle(lane); break;
      case 'box_stack': obs = createBoxStackObstacle(lane); break;
      case 'cone': obs = createConeObstacle(lane); break;
      default: obs = createBarrierObstacle(lane);
    }

    obs.position.set(STATE.lanePositions[lane], 0, playerGroup.position.z - 50);
    scene.add(obs);
    obstacles.push(obs);
  });
}

const coins = [];
const coinPool = [];

function getPooledCoin() {
  if (coinPool.length > 0) {
    const c = coinPool.pop();
    c.visible = true;
    return c;
  }
  const group = new THREE.Group();
  const mesh = new THREE.Mesh(GEO.coin, MAT.coin.clone());
  mesh.castShadow = true;
  group.add(mesh);
  // Glow ring
  const ring = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.04, 6, 12), new THREE.MeshLambertMaterial({ color: 0xffaa00, emissive: 0xff8800, emissiveIntensity: 0.5 }));
  group.add(ring);
  scene.add(group);
  return group;
}

function spawnCoins() {
  const pattern = Math.floor(Math.random() * 4);
  const lane = Math.floor(Math.random() * 3);
  const baseZ = playerGroup.position.z - 55;

  if (pattern === 0) {
    // Line in one lane
    for (let i = 0; i < 6; i++) {
      const c = getPooledCoin();
      c.position.set(STATE.lanePositions[lane], 1.0, baseZ - i * 1.4);
      c.userData = { collected: false };
      coins.push(c);
    }
  } else if (pattern === 1) {
    // Arc (jump pattern)
    for (let i = 0; i < 5; i++) {
      const c = getPooledCoin();
      const h = Math.sin(i / 4 * Math.PI) * 2 + 0.8;
      c.position.set(STATE.lanePositions[lane], h, baseZ - i * 1.5);
      c.userData = { collected: false };
      coins.push(c);
    }
  } else if (pattern === 2) {
    // Row across all 3 lanes
    for (let l = 0; l < 3; l++) {
      const c = getPooledCoin();
      c.position.set(STATE.lanePositions[l], 0.8, baseZ);
      c.userData = { collected: false };
      coins.push(c);
    }
  } else {
    // Zigzag
    for (let i = 0; i < 6; i++) {
      const c = getPooledCoin();
      const l2 = i % 3;
      c.position.set(STATE.lanePositions[l2], 0.8, baseZ - i * 1.8);
      c.userData = { collected: false };
      coins.push(c);
    }
  }
}

// ============================================================
// INPUT HANDLING
// ============================================================
const keys = {};
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener('keydown', e => {
  if (!STATE.running || STATE.gameOver) return;
  switch (e.code) {
    case 'ArrowLeft': case 'KeyA': moveLeft(); break;
    case 'ArrowRight': case 'KeyD': moveRight(); break;
    case 'ArrowUp': case 'KeyW': case 'Space': jump(); break;
    case 'ArrowDown': case 'KeyS': roll(); break;
  }
  e.preventDefault();
});

document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  if (!STATE.running || STATE.gameOver) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (absDx < 20 && absDy < 20) {
    jump();
    return;
  }
  if (absDx > absDy) {
    if (dx > 0) moveRight(); else moveLeft();
  } else {
    if (dy < 0) jump(); else roll();
  }
}, { passive: true });

function moveLeft() {
  if (STATE.lane > 0) {
    STATE.lane--;
    STATE.targetLaneX = STATE.lanePositions[STATE.lane];
    showLaneChangeEffect();
  }
}

function moveRight() {
  if (STATE.lane < 2) {
    STATE.lane++;
    STATE.targetLaneX = STATE.lanePositions[STATE.lane];
    showLaneChangeEffect();
  }
}

function jump() {
  if (STATE.jumpCount < STATE.maxJumps) {
    STATE.jumpVelocity = STATE.activePowerups.jetpack > 0 ? 14 : 10;
    STATE.jumping = true;
    STATE.rolling = false;
    STATE.jumpCount++;
    createParticle(playerGroup.position.x, 0.2, playerGroup.position.z, 0x88ccff, 5);
  }
}

function roll() {
  if (!STATE.rolling && STATE.playerY < 0.5) {
    STATE.rolling = true;
    STATE.rollTimer = 0.7;
    STATE.jumping = false;
    STATE.jumpVelocity = 0;
    STATE.jumpCount = 0;
    createParticle(playerGroup.position.x, 0.2, playerGroup.position.z, 0x88ccff, 4);
  }
}

function showLaneChangeEffect() {
  createParticle(playerGroup.position.x, 0.3, playerGroup.position.z, 0x00ccff, 4);
}

// ============================================================
// GAME LOGIC
// ============================================================
let obstacleTimer = 0;
let obstacleInterval = 3.5;
let coinTimer = 0;
let coinInterval = 2.5;
let powerupTimer = 0;
let powerupInterval = 12;
let tileUpdateTimer = 0;
let animTime = 0;

function startGame() {
  STATE.running = true;
  STATE.gameOver = false;
  STATE.score = 0;
  STATE.coins = 0;
  STATE.distance = 0;
  STATE.distanceTraveled = 0;
  STATE.speed = STATE.baseSpeed;
  STATE.lane = 1;
  STATE.targetLaneX = 0;
  STATE.playerY = 0;
  STATE.jumping = false;
  STATE.rolling = false;
  STATE.jumpVelocity = 0;
  STATE.jumpCount = 0;
  STATE.invincible = false;
  STATE.invincibleTimer = 0;
  STATE.multiplier = 1;
  STATE.shakeIntensity = 0;
  STATE.lastSpeedIncrease = 0;
  STATE.activePowerups = { magnet: 0, jetpack: 0, shield: 0, x2: 0 };
  STATE.particles = [];
  obstacleTimer = 0;
  coinTimer = 0;
  powerupTimer = 0;
  animTime = 0;

  // Clear objects
  obstacles.forEach(o => { scene.remove(o); disposeGroup(o); });
  obstacles.length = 0;
  coins.forEach(c => { c.visible = false; coinPool.push(c); });
  coins.length = 0;
  powerups.forEach(p => { scene.remove(p); });
  powerups.length = 0;
  STATE.particles.forEach(p => { scene.remove(p); });
  STATE.particles.length = 0;

  // Reset player
  playerGroup.position.set(0, 0, 2);
  playerGroup.rotation.set(0, 0, 0);

  // Reset tiles
  tiles.forEach((t, i) => { t.position.z = -i * TILE_LENGTH; });

  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameoverScreen').classList.add('hidden');

  updateHUD();
}

function disposeGroup(group) {
  group.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
  });
}

function gameOver() {
  if (STATE.invincible || STATE.activePowerups.shield > 0) {
    STATE.activePowerups.shield = 0;
    updatePowerupUI();
    STATE.invincible = true;
    STATE.invincibleTimer = 1.5;
    createHitEffect(playerGroup.position.x, playerGroup.position.y + 1, playerGroup.position.z);
    return;
  }

  STATE.running = false;
  STATE.gameOver = true;

  createHitEffect(playerGroup.position.x, playerGroup.position.y + 1, playerGroup.position.z);

  if (STATE.score > STATE.highScore) {
    STATE.highScore = STATE.score;
    localStorage.setItem('ss3d_high', STATE.highScore);
    document.getElementById('newHigh').style.animation = 'none';
    requestAnimationFrame(() => {
      document.getElementById('newHigh').style.animation = 'highFlash 2s ease-out forwards';
    });
  }

  STATE.totalCoins += STATE.coins;
  localStorage.setItem('ss3d_coins', STATE.totalCoins);

  document.getElementById('overScoreVal').textContent = `Score: ${STATE.score}`;
  document.getElementById('overHighVal').textContent = `Best: ${STATE.highScore}`;
  document.getElementById('gameoverScreen').classList.remove('hidden');

  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = STATE.score;
  document.getElementById('highVal').textContent = STATE.highScore;
  document.getElementById('coinVal').textContent = STATE.coins;
  document.getElementById('distanceBar').textContent = `📏 ${Math.floor(STATE.distanceTraveled)}m`;
  document.getElementById('speedIndicator').textContent = `SPEED: ${(STATE.speed / STATE.baseSpeed).toFixed(1)}x`;
}

function collectCoin(coin) {
  if (coin.userData.collected) return;
  coin.userData.collected = true;
  coin.visible = false;
  coinPool.push(coin);
  const idx = coins.indexOf(coin);
  if (idx !== -1) coins.splice(idx, 1);

  const value = STATE.multiplier * (STATE.activePowerups.x2 > 0 ? 2 : 1);
  STATE.coins += value;
  STATE.score += value * 10;
  showScorePopup(`+${value * 10}`, coin.position.x, coin.position.y, coin.position.z);
  createCoinBurst(coin.position.x, coin.position.y, coin.position.z);
}

function collectPowerup(pu) {
  if (pu.userData.collected) return;
  pu.userData.collected = true;
  scene.remove(pu);
  const idx = powerups.indexOf(pu);
  if (idx !== -1) powerups.splice(idx, 1);

  const type = pu.userData.type;
  const duration = 8;
  STATE.activePowerups[type] = duration;

  if (type === 'jetpack') {
    STATE.jumping = true;
    STATE.playerY = 3;
    STATE.jumpVelocity = 0;
  }

  updatePowerupUI();
  createParticle(pu.position.x, pu.position.y, pu.position.z, 0x00ff88, 20);
  showScorePopup('POWERUP!', pu.position.x, pu.position.y + 0.5, pu.position.z);
}

function updatePowerupUI() {
  const icons = { magnet: 'puMagnet', jetpack: 'puJetpack', shield: 'puShield', x2: 'puX2' };
  const timers = { magnet: 'magnetTimer', jetpack: 'jetpackTimer', shield: 'shieldTimer', x2: 'x2Timer' };

  for (const [type, id] of Object.entries(icons)) {
    const el = document.getElementById(id);
    const active = STATE.activePowerups[type] > 0;
    el.classList.toggle('active', active);
    if (active) {
      document.getElementById(timers[type]).textContent = Math.ceil(STATE.activePowerups[type]);
    }
  }

  // Shield visual
  playerGroup.userData.shield.visible = STATE.activePowerups.shield > 0;
  playerGroup.userData.jetpack.visible = STATE.activePowerups.jetpack > 0;

  // x2 multiplier badge
  const badge = document.getElementById('multiplierBadge');
  badge.style.opacity = STATE.activePowerups.x2 > 0 ? '1' : '0';
}

// ============================================================
// SCORE POPUP
// ============================================================
function showScorePopup(text, wx, wy, wz) {
  // Project 3D pos to 2D screen
  const vec = new THREE.Vector3(wx, wy + 1.5, wz);
  vec.project(camera);
  const sx = (vec.x * 0.5 + 0.5) * window.innerWidth;
  const sy = (-vec.y * 0.5 + 0.5) * window.innerHeight;

  const el = document.createElement('div');
  el.className = 'popup';
  el.textContent = text;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ============================================================
// UPDATE LOOP
// ============================================================
const clock = new THREE.Clock();
let lastTime = 0;

function update(dt) {
  if (!STATE.running || STATE.gameOver) return;

  animTime += dt;
  const speedFactor = STATE.speed / STATE.baseSpeed;

  // Speed increase
  STATE.distanceTraveled += STATE.speed * dt;
  STATE.distance += dt;
  STATE.score += Math.floor(STATE.speed * dt * 2);

  if (STATE.distanceTraveled - STATE.lastSpeedIncrease > 100) {
    STATE.speed = Math.min(STATE.speed + 1.2, STATE.maxSpeed);
    STATE.lastSpeedIncrease = STATE.distanceTraveled;
    obstacleInterval = Math.max(1.5, obstacleInterval - 0.08);
    coinInterval = Math.max(1.5, coinInterval - 0.04);
  }

  // Powerup timers
  for (const type of ['magnet', 'jetpack', 'shield', 'x2']) {
    if (STATE.activePowerups[type] > 0) {
      STATE.activePowerups[type] -= dt;
      if (STATE.activePowerups[type] <= 0) {
        STATE.activePowerups[type] = 0;
        if (type === 'jetpack' && STATE.jumping) {
          STATE.jumpVelocity = 3;
        }
      }
    }
  }
  updatePowerupUI();

  // Invincibility
  if (STATE.invincible) {
    STATE.invincibleTimer -= dt;
    if (STATE.invincibleTimer <= 0) STATE.invincible = false;
    // Blink effect
    playerGroup.visible = Math.sin(animTime * 20) > 0;
  } else {
    playerGroup.visible = true;
  }

  // Player lane movement (smooth)
  const laneSpeed = 12;
  const dx = STATE.targetLaneX - playerGroup.position.x;
  playerGroup.position.x += dx * Math.min(1, laneSpeed * dt);

  // Gravity / jumping
  if (STATE.activePowerups.jetpack > 0) {
    // Float up
    const targetY = 4.5;
    STATE.playerY += (targetY - STATE.playerY) * 5 * dt;
    STATE.jumpVelocity = 0;
  } else {
    const gravity = -22;
    STATE.jumpVelocity += gravity * dt;
    STATE.playerY += STATE.jumpVelocity * dt;

    if (STATE.playerY <= 0) {
      STATE.playerY = 0;
      STATE.jumpVelocity = 0;
      STATE.jumping = false;
      STATE.jumpCount = 0;
    }
  }

  // Rolling
  if (STATE.rolling) {
    STATE.rollTimer -= dt;
    if (STATE.rollTimer <= 0) {
      STATE.rolling = false;
    }
  }

  playerGroup.position.y = STATE.playerY;
  playerGroup.position.z = 2;

  // Camera follow with slight lag + shake
  const camTargetX = playerGroup.position.x * 0.3;
  const camTargetY = 5 + STATE.playerY * 0.4;
  camera.position.x += (camTargetX - camera.position.x) * 5 * dt;
  camera.position.y += (camTargetY - camera.position.y) * 5 * dt;

  if (STATE.shakeIntensity > 0) {
    camera.position.x += (Math.random() - 0.5) * STATE.shakeIntensity;
    camera.position.y += (Math.random() - 0.5) * STATE.shakeIntensity * 0.5;
    STATE.shakeIntensity *= 0.85;
    if (STATE.shakeIntensity < 0.01) STATE.shakeIntensity = 0;
  }

  camera.lookAt(playerGroup.position.x * 0.3, 2 + STATE.playerY * 0.2, -5);

  // Player animation
  animatePlayer(dt, speedFactor);

  // Move tiles
  tiles.forEach(tile => {
    tile.position.z += STATE.speed * dt;
    if (tile.position.z > TILE_LENGTH * 1.5) {
      tile.position.z -= TILE_COUNT * TILE_LENGTH;
    }
  });

  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    obs.position.z += STATE.speed * dt;

    // Animate warning lights etc
    if (obs.userData.type === 'train_low') {
      obs.children.forEach(c => {
        if (c.material && c.material.emissive) {
          c.material.emissiveIntensity = 0.5 + Math.sin(animTime * 6) * 0.5;
        }
      });
    }

    if (obs.position.z > 10) {
      scene.remove(obs);
      disposeGroup(obs);
      obstacles.splice(i, 1);
      continue;
    }

    // Collision check
    if (!STATE.invincible && !STATE.activePowerups.shield) {
      const distZ = Math.abs(obs.position.z - playerGroup.position.z);
      const distX = Math.abs(obs.position.x - playerGroup.position.x);

      if (distZ < 1.2 && distX < (obs.userData.hitW / 2 + 0.25)) {
        // Check if player cleared it
        const needJump = obs.userData.needsJump;
        const canRoll = obs.userData.canRoll;
        const obsH = obs.userData.hitH || 1;
        const playerH = STATE.rolling ? 0.5 : 1.8;
        const playerTop = STATE.playerY + playerH;
        const playerBottom = STATE.playerY;

        // Rolling under high obstacle
        if (canRoll && obs.userData.rollClearY && STATE.rolling && STATE.playerY < 0.5) {
          continue; // cleared!
        }
        // Jumping over
        if (needJump && STATE.playerY > obsH - 0.2) {
          continue; // cleared!
        }
        // Must change lane for cone
        if (obs.userData.mustSidestep) {
          continue; // lane already changed
        }

        gameOver();
        break;
      }
    }
  }

  // Move coins
  for (let i = coins.length - 1; i >= 0; i--) {
    const coin = coins[i];
    coin.position.z += STATE.speed * dt;

    // Spin
    coin.rotation.y += 3 * dt;

    if (coin.position.z > 8) {
      coin.visible = false;
      coinPool.push(coin);
      coins.splice(i, 1);
      continue;
    }

    // Magnet: attract coins
    if (STATE.activePowerups.magnet > 0) {
      const dx2 = playerGroup.position.x - coin.position.x;
      const dy2 = (STATE.playerY + 1) - coin.position.y;
      const dz2 = playerGroup.position.z - coin.position.z;
      const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2 + dz2 * dz2);
      if (dist < 8) {
        coin.position.x += dx2 * 8 * dt;
        coin.position.y += dy2 * 8 * dt;
        coin.position.z += dz2 * 8 * dt;
      }
    }

    // Collection check
    const cdist = Math.sqrt(
      Math.pow(coin.position.x - playerGroup.position.x, 2) +
      Math.pow(coin.position.y - (STATE.playerY + 1), 2) +
      Math.pow(coin.position.z - playerGroup.position.z, 2)
    );
    if (cdist < 1.0) {
      collectCoin(coin);
    }
  }

  // Move powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.position.z += STATE.speed * dt;
    pu.userData.body.rotation.y += 2 * dt;
    pu.userData.body.rotation.x += 1.5 * dt;
    pu.userData.orbit.rotation.z += 2.5 * dt;
    pu.position.y = 1.2 + Math.sin(animTime * 2 + i) * 0.3;

    if (pu.position.z > 8) {
      scene.remove(pu);
      powerups.splice(i, 1);
      continue;
    }

    const pdist = Math.sqrt(
      Math.pow(pu.position.x - playerGroup.position.x, 2) +
      Math.pow(pu.position.z - playerGroup.position.z, 2)
    );
    if (pdist < 1.2) collectPowerup(pu);
  }

  // Train
  trainTimer += dt;
  if (trainTimer > trainInterval) {
    trainTimer = 0;
    trainInterval = 12 + Math.random() * 8;
    spawnTrain();
  }

  if (trainActive) {
    trainGroup.position.z += STATE.speed * 1.8 * dt;
    if (trainGroup.position.z > 40) {
      trainGroup.visible = false;
      trainActive = false;
    }
  }

  // Spawn system
  obstacleTimer += dt;
  if (obstacleTimer > obstacleInterval) {
    obstacleTimer = 0;
    spawnObstacle();
  }

  coinTimer += dt;
  if (coinTimer > coinInterval) {
    coinTimer = 0;
    spawnCoins();
  }

  powerupTimer += dt;
  if (powerupTimer > powerupInterval) {
    powerupTimer = 0;
    powerupInterval = 10 + Math.random() * 8;
    spawnPowerup();
  }

  // Player light follows player
  playerLight.position.set(playerGroup.position.x, STATE.playerY + 3, playerGroup.position.z);

  // Particles
  for (let i = STATE.particles.length - 1; i >= 0; i--) {
    const p = STATE.particles[i];
    p.userData.life -= dt / p.userData.maxLife;
    if (p.userData.life <= 0) {
      p.visible = false;
      particlePool.push(p);
      STATE.particles.splice(i, 1);
      continue;
    }
    p.position.x += p.userData.vx * dt;
    p.position.y += p.userData.vy * dt;
    p.position.z += p.userData.vz * dt + STATE.speed * dt;
    p.userData.vy -= 8 * dt; // gravity on particles
    p.scale.setScalar(p.userData.life);
  }

  // Update HUD every few frames
  if (Math.floor(animTime * 10) % 3 === 0) {
    updateHUD();
  }
}

function animatePlayer(dt, speedFactor) {
  const t = animTime;

  if (STATE.rolling) {
    // Roll: lean forward, scrunch down
    playerGroup.rotation.x = -0.7;
    playerGroup.scale.y = 0.6;
    playerGroup.scale.z = 1.3;
    playerGroup.userData.board.position.z = 0.1;
  } else if (STATE.jumping) {
    // Jump: lean back a bit, arms up
    playerGroup.rotation.x = 0.15;
    playerGroup.scale.y = 1.1;
    playerGroup.scale.z = 0.9;
    playerGroup.userData.armL.rotation.x = -1.0;
    playerGroup.userData.armR.rotation.x = -1.0;
    playerGroup.userData.legL.rotation.x = 0.4;
    playerGroup.userData.legR.rotation.x = -0.4;
    playerGroup.userData.board.position.z = 0;
  } else {
    // Running: normal skateboard pose with leg pump
    playerGroup.rotation.x = -0.08;
    playerGroup.scale.set(1, 1, 1);

    const freq = speedFactor * 4;
    playerGroup.userData.legL.rotation.x = Math.sin(t * freq) * 0.4;
    playerGroup.userData.legR.rotation.x = -Math.sin(t * freq) * 0.4;
    playerGroup.userData.armL.rotation.x = -Math.sin(t * freq) * 0.3;
    playerGroup.userData.armR.rotation.x = Math.sin(t * freq) * 0.3;

    // Head bob
    playerGroup.userData.head.position.y = 1.55 + Math.sin(t * freq * 2) * 0.03;

    // Skateboard tilt
    playerGroup.userData.board.rotation.z = Math.sin(t * freq * 2) * 0.05;
    playerGroup.userData.board.position.z = 0;
  }

  // Lane change tilt
  const tiltTarget = -(STATE.targetLaneX - playerGroup.position.x) * 0.15;
  playerGroup.rotation.z += (tiltTarget - playerGroup.rotation.z) * 8 * dt;
}

// ============================================================
// RENDER LOOP
// ============================================================
function animate(time) {
  requestAnimationFrame(animate);

  const dt = Math.min((time - lastTime) / 1000, 0.033); // cap at 33ms (30fps min)
  lastTime = time;

  update(dt);
  renderer.render(scene, camera);
}

// ============================================================
// UI BINDINGS
// ============================================================
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// BACKGROUND CITY (static far buildings for depth)
// ============================================================
function createCityBackdrop() {
  const buildingColors = [0x1a1a3a, 0x2a1a3a, 0x1a2a3a, 0x1a3a2a, 0x3a2a1a];
  for (let i = 0; i < 40; i++) {
    const w = 4 + Math.random() * 8;
    const h = 15 + Math.random() * 50;
    const col = buildingColors[Math.floor(Math.random() * buildingColors.length)];
    const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, 4), new THREE.MeshLambertMaterial({ color: col }));
    const side = Math.random() < 0.5 ? -1 : 1;
    b.position.set(side * (20 + Math.random() * 30), h / 2 - 0.4, -80 - Math.random() * 80);
    scene.add(b);

    // Glow windows on far buildings
    for (let j = 0; j < 6; j++) {
      const win = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.1), new THREE.MeshLambertMaterial({
        color: 0xffffaa, emissive: 0xffdd44, emissiveIntensity: Math.random() * 0.8 + 0.2
      }));
      win.position.set(
        b.position.x + (Math.random() - 0.5) * w * 0.8,
        Math.random() * h,
        b.position.z + 2.1
      );
      scene.add(win);
    }
  }
}
createCityBackdrop();

// ============================================================
// ANIMATED NEON SIGNS
// ============================================================
function createNeonSigns() {
  const signs = [
    { text: 'SUBWAY', color: 0xff00ff, x: 9, y: 10, z: -30 },
    { text: 'SURFERS', color: 0x00ffff, x: -9, y: 12, z: -60 },
    { text: '3D', color: 0xff4400, x: 9, y: 8, z: -90 },
  ];

  signs.forEach(s => {
    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(3, 0.8),
      new THREE.MeshLambertMaterial({ color: s.color, emissive: s.color, emissiveIntensity: 0.9 })
    );
    plane.position.set(s.x, s.y, s.z);
    if (s.x > 0) plane.rotation.y = -Math.PI / 3;
    else plane.rotation.y = Math.PI / 3;
    scene.add(plane);
  });
}
createNeonSigns();

// ============================================================
// FOG AMBIENT PARTICLES (floating dust)
// ============================================================
function createAmbientDust() {
  const dustGeo = new THREE.BufferGeometry();
  const count = 200;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3] = (Math.random() - 0.5) * 16;
    pos[i * 3 + 1] = Math.random() * 6;
    pos[i * 3 + 2] = -Math.random() * 60;
  }
  dustGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const dustMat = new THREE.PointsMaterial({ color: 0x8888ff, size: 0.08, transparent: true, opacity: 0.4 });
  const dust = new THREE.Points(dustGeo, dustMat);
  scene.add(dust);

  // Animate dust in render loop extension
  dust.userData.originalPositions = pos.slice();
  return dust;
}
const ambientDust = createAmbientDust();

// Extend update to animate dust
const origUpdate = update;

// Initial static scene for menu
tiles.forEach((t, i) => { t.position.z = -i * TILE_LENGTH; });
playerGroup.position.set(0, 0, 2);

// Menu camera position
camera.position.set(0, 5, 10);
camera.lookAt(0, 2, -5);

// Menu idle animation
function menuAnimate(time) {
  if (STATE.running) return;
  requestAnimationFrame(menuIdle);
}

let menuAnimId = null;
function menuIdle(time) {
  if (STATE.running) return;
  renderer.render(scene, camera);

  // Slowly move tiles for menu effect
  const dt2 = 0.016;
  tiles.forEach(tile => {
    tile.position.z += 8 * dt2;
    if (tile.position.z > TILE_LENGTH * 1.5) {
      tile.position.z -= TILE_COUNT * TILE_LENGTH;
    }
  });

  // Rotate player on menu
  playerGroup.rotation.y = Math.sin(time / 1500) * 0.3;
  playerGroup.userData.armL && (playerGroup.userData.armL.rotation.x = Math.sin(time / 400) * 0.4);
  playerGroup.userData.armR && (playerGroup.userData.armR.rotation.x = -Math.sin(time / 400) * 0.4);
  playerGroup.userData.legL && (playerGroup.userData.legL.rotation.x = Math.sin(time / 400) * 0.4);
  playerGroup.userData.legR && (playerGroup.userData.legR.rotation.x = -Math.sin(time / 400) * 0.4);

  menuAnimId = requestAnimationFrame(menuIdle);
}

menuAnimId = requestAnimationFrame(menuIdle);

// Override startGame to properly start main loop
const _startGame = startGame;
document.getElementById('startBtn').removeEventListener('click', startGame);
document.getElementById('restartBtn').removeEventListener('click', startGame);

function startGameFull() {
  if (menuAnimId) { cancelAnimationFrame(menuAnimId); menuAnimId = null; }
  _startGame();
  lastTime = performance.now();
  requestAnimationFrame(animate);
}

document.getElementById('startBtn').addEventListener('click', startGameFull);
document.getElementById('restartBtn').addEventListener('click', () => {
  // Don't need to restart animation loop on restart
  _startGame();
  // If loop stopped somehow, restart
});

// For restart: modify the original startGame to work inside existing loop
// The animate loop checks STATE.running, so just calling _startGame() is enough

document.getElementById('restartBtn').addEventListener('click', _startGame);

createTrackTile(0); // Extra tile for buffer
