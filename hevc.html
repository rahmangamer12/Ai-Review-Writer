<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HEVC to MP4 Converter | Modern Web Tool</title>
  <!-- Google Fonts & Simple Icons via Font Awesome (optional but lightweight) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main glass card */
    .converter-card {
      max-width: 880px;
      width: 100%;
      background: rgba(18, 25, 40, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      border: 1px solid rgba(72, 187, 255, 0.2);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(72, 187, 255, 0.1);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .card-header {
      padding: 1.8rem 2rem 1rem 2rem;
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
    }

    .card-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #E0F2FE, #7DD3FC);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .card-header h1 i {
      background: none;
      color: #38bdf8;
      font-size: 2rem;
    }

    .sub {
      color: #94a3b8;
      margin-top: 0.5rem;
      font-size: 0.9rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(56, 189, 248, 0.15);
      padding: 0.2rem 0.7rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #7dd3fc;
      border: 0.5px solid rgba(56, 189, 248, 0.4);
    }

    /* dropzone */
    .dropzone {
      margin: 1.8rem 2rem 1.5rem 2rem;
      background: rgba(2, 8, 23, 0.5);
      border: 2px dashed rgba(56, 189, 248, 0.5);
      border-radius: 1.8rem;
      padding: 2.2rem 1.5rem;
      text-align: center;
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .dropzone.drag-over {
      border-color: #38bdf8;
      background: rgba(56, 189, 248, 0.08);
      transform: scale(0.99);
    }

    .dropzone i {
      font-size: 3.2rem;
      color: #38bdf8;
      margin-bottom: 0.8rem;
    }

    .dropzone p {
      color: #cbd5e1;
      font-weight: 500;
      font-size: 1rem;
    }

    .file-label {
      background: #1e293b;
      display: inline-block;
      margin-top: 1rem;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      transition: 0.2s;
      border: 1px solid #334155;
      cursor: pointer;
    }

    .file-label:hover {
      background: #2d3a4e;
      border-color: #38bdf8;
    }

    input[type="file"] {
      display: none;
    }

    /* file info panel */
    .file-info {
      margin: 0 2rem 1rem 2rem;
      background: #0f172ad9;
      border-radius: 1.2rem;
      padding: 0.8rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      backdrop-filter: blur(4px);
    }

    .file-details {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #a0afc3;
    }

    .file-details i {
      font-size: 1.2rem;
      color: #38bdf8;
    }

    .file-size {
      background: #1e293b;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-family: monospace;
      font-size: 0.75rem;
    }

    /* progress & logs */
    .progress-section {
      margin: 0.5rem 2rem 1rem 2rem;
    }

    .progress-bar-container {
      background: #1e293b;
      border-radius: 40px;
      height: 8px;
      width: 100%;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 40px;
      transition: width 0.2s ease;
    }

    .status-text {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
    }

    .log-area {
      background: #030712cc;
      border-radius: 1rem;
      margin: 0.8rem 2rem 1.2rem 2rem;
      padding: 0.9rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      max-height: 150px;
      overflow-y: auto;
      color: #b9c7db;
      border: 1px solid #1e2a3e;
    }

    .log-line {
      border-left: 2px solid #38bdf8;
      padding-left: 8px;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .button-group {
      display: flex;
      gap: 14px;
      margin: 0.5rem 2rem 2rem 2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.6rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e293b;
      color: #e2e8f0;
    }

    .btn-primary {
      background: linear-gradient(105deg, #0e7ab3, #1e40af);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
      border: 0.5px solid #38bdf8;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(105deg, #1e88c9, #2563eb);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(56, 189, 248, 0.3);
    }

    .btn-success {
      background: #0f3b2c;
      border: 1px solid #2dd4bf;
      color: #ccfbf1;
    }

    .btn-success:hover:not(:disabled) {
      background: #115e49;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .download-btn {
      background: #0f172a;
      border: 1px solid #38bdf8;
    }

    .error-text {
      color: #f87171;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      padding: 1rem 2rem 1.5rem;
      color: #5b6e8c;
      border-top: 1px solid rgba(56, 189, 248, 0.1);
    }

    @media (max-width: 600px) {
      .converter-card {
        margin: 0;
      }
      .button-group {
        flex-direction: column;
      }
      .btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

<div class="converter-card">
  <div class="card-header">
    <h1>
      <i class="fas fa-video"></i> 
      HEVC → MP4
    </h1>
    <div class="sub">
      <span>Convert HEVC (H.265) videos to MP4 (H.264/AAC)</span>
      <span class="badge"><i class="fas fa-microchip"></i> FFmpeg.wasm</span>
      <span class="badge"><i class="fas fa-globe"></i> client-side</span>
    </div>
  </div>

  <!-- Drop Zone -->
  <div id="dropzone" class="dropzone">
    <i class="fas fa-cloud-upload-alt"></i>
    <p>Drag & drop your video here</p>
    <label class="file-label" for="fileInput">
      <i class="fas fa-folder-open"></i> Browse files
    </label>
    <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/x-matroska,video/webm,video/*">
  </div>

  <!-- File info panel -->
  <div id="fileInfoPanel" class="file-info" style="display: none;">
    <div class="file-details">
      <i class="fas fa-file-video"></i>
      <span id="fileName">—</span>
      <span id="fileSize" class="file-size">—</span>
    </div>
    <div><i class="fas fa-code-branch"></i> <span id="codecHint">HEVC / any video</span></div>
  </div>

  <!-- Progress & Status -->
  <div class="progress-section">
    <div class="progress-bar-container">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div class="status-text">
      <span id="statusMsg"><i class="fas fa-info-circle"></i> Ready — select a video file</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <!-- Logs (FFmpeg output) -->
  <div class="log-area" id="logArea">
    <div class="log-line">⚡ System ready — waiting for input</div>
  </div>

  <!-- Action Buttons -->
  <div class="button-group">
    <button id="convertBtn" class="btn btn-primary" disabled>
      <i class="fas fa-exchange-alt"></i> Convert to MP4
    </button>
    <button id="downloadBtn" class="btn download-btn" disabled>
      <i class="fas fa-download"></i> Download MP4
    </button>
    <button id="clearLogsBtn" class="btn">
      <i class="fas fa-broom"></i> Clear Logs
    </button>
  </div>
  <footer>
    <i class="fas fa-shield-alt"></i> 100% client‑side • HEVC, H.264, MOV, MKV → MP4 • Uses WebAssembly (FFmpeg)
  </footer>
</div>

<!-- FFmpeg.wasm scripts -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js"></script>
<script src="https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js"></script>

<script>
  // ---------- DOM Elements ----------
  const dropZone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileInfoPanel = document.getElementById('fileInfoPanel');
  const fileNameSpan = document.getElementById('fileName');
  const fileSizeSpan = document.getElementById('fileSize');
  const convertBtn = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const clearLogsBtn = document.getElementById('clearLogsBtn');
  const progressFill = document.getElementById('progressFill');
  const statusMsgSpan = document.getElementById('statusMsg');
  const progressPercentSpan = document.getElementById('progressPercent');
  const logArea = document.getElementById('logArea');
  const codecHintSpan = document.getElementById('codecHint');

  // ---------- Global state ----------
  let selectedFile = null;
  let ffmpeg = null;            // FFmpeg instance
  let ffmpegLoaded = false;
  let isConverting = false;
  let outputBlob = null;        // generated MP4 blob
  let outputFilename = "converted_video.mp4";

  // Helper: add log message
  function addLog(message, isError = false) {
    const logDiv = document.createElement('div');
    logDiv.className = 'log-line';
    logDiv.style.borderLeftColor = isError ? '#f87171' : '#38bdf8';
    logDiv.innerHTML = isError ? `<i class="fas fa-exclamation-triangle" style="color:#f87171; margin-right:6px;"></i> ${escapeHtml(message)}` : `📌 ${escapeHtml(message)}`;
    logArea.appendChild(logDiv);
    logDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    // keep only last 50 logs approx (avoid memory)
    while (logArea.children.length > 65) logArea.removeChild(logArea.firstChild);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  function clearLogs() {
    while (logArea.firstChild) logArea.removeChild(logArea.firstChild);
    addLog("🧹 Logs cleared — ready for next conversion");
  }

  // update UI progress (0-1)
  function updateProgress(percent, message) {
    const clamped = Math.min(100, Math.max(0, percent));
    progressFill.style.width = `${clamped}%`;
    progressPercentSpan.innerText = `${Math.floor(clamped)}%`;
    if (message) statusMsgSpan.innerHTML = `<i class="fas fa-cog fa-fw"></i> ${message}`;
  }

  function setStatus(message, isError = false) {
    if (isError) {
      statusMsgSpan.innerHTML = `<i class="fas fa-times-circle" style="color:#f87171"></i> ${message}`;
    } else {
      statusMsgSpan.innerHTML = `<i class="fas fa-circle-info"></i> ${message}`;
    }
  }

  // load ffmpeg core once
  async function initFFmpeg() {
    if (ffmpegLoaded && ffmpeg) return true;
    if (ffmpeg && ffmpeg.isLoaded()) return true;
    try {
      setStatus("Loading FFmpeg core (~30MB) ... first load may take a few seconds");
      addLog("⏳ Initializing FFmpeg.wasm (WebAssembly) ...");
      ffmpeg = new FFmpeg.createFFmpeg({ 
        log: true,
        corePath: 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/ffmpeg-core.js',
        mainName: 'main',
      });
      // capture logs from ffmpeg internal stderr
      ffmpeg.setLogger(({ type, message }) => {
        if (type === 'fferr' || type === 'error') {
          addLog(`[ffmpeg] ${message}`, true);
        } else if (type === 'ffout') {
          addLog(`[ffmpeg] ${message}`);
        } else {
          // info, etc
          if (message && message.includes("frame=")) {
            // optional: parse progress from frames but we rely on progress callback
          }
        }
      });
      
      ffmpeg.setProgress((progress) => {
        // progress ratio: 0 to 1 (based on time)
        if (progress && progress.ratio) {
          const percent = progress.ratio * 100;
          updateProgress(percent, `Converting: ${Math.floor(percent)}%`);
        }
      });
      
      await ffmpeg.load();
      ffmpegLoaded = true;
      addLog("✅ FFmpeg core loaded successfully (HEVC support ready)");
      setStatus("FFmpeg ready — choose video file");
      return true;
    } catch (err) {
      console.error(err);
      addLog(`❌ FFmpeg load failed: ${err.message}`, true);
      setStatus("FFmpeg load error, check network/console", true);
      return false;
    }
  }

  // handle file selection
  function handleFile(file) {
    if (!file) return;
    if (!file.type.startsWith('video/') && !file.name.match(/\.(mp4|mov|mkv|webm|avi|m4v|hevc)$/i)) {
      addLog(`⚠️ Selected file "${file.name}" may not be a valid video. Try HEVC/MOV/MKV/MP4`, true);
      setStatus("Invalid file type — please select a video file", true);
      return false;
    }
    selectedFile = file;
    fileNameSpan.innerText = file.name.length > 40 ? file.name.slice(0, 37) + '...' : file.name;
    const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
    fileSizeSpan.innerText = `${sizeMB} MB`;
    fileInfoPanel.style.display = 'flex';
    
    // heuristics
    if (file.name.toLowerCase().includes('hevc') || file.name.toLowerCase().includes('h265')) {
      codecHintSpan.innerHTML = '<i class="fas fa-microchip"></i> HEVC detected';
    } else {
      codecHintSpan.innerHTML = '<i class="fas fa-waveform"></i> Ready for conversion';
    }
    
    // enable convert button
    convertBtn.disabled = false;
    downloadBtn.disabled = true;
    outputBlob = null;
    setStatus(`File ready: ${file.name} (${sizeMB} MB)`);
    addLog(`📁 Selected "${file.name}" (${sizeMB} MB) — click Convert to MP4 (H.264)`);
    if (file.size > 300 * 1024 * 1024) {
      addLog(`⚠️ Large file (${sizeMB} MB) — conversion may use significant RAM and time.`, true);
    }
    return true;
  }

  // actual conversion pipeline
  async function startConversion() {
    if (!selectedFile) {
      setStatus("No file selected", true);
      return;
    }
    if (isConverting) {
      addLog("Conversion already in progress, please wait...");
      return;
    }
    if (!ffmpegLoaded) {
      const loaded = await initFFmpeg();
      if (!loaded) return;
    }
    isConverting = true;
    convertBtn.disabled = true;
    downloadBtn.disabled = true;
    updateProgress(0, "Starting conversion...");
    setStatus("Preparing FFmpeg workspace...");
    addLog(`🔄 Starting conversion: ${selectedFile.name} → MP4 (H.264 + AAC)`);
    
    try {
      // Write input file to virtual MEMFS
      const inputFileName = "input_" + Date.now() + "_source";
      const fileData = new Uint8Array(await selectedFile.arrayBuffer());
      ffmpeg.FS('writeFile', inputFileName, fileData);
      addLog(`📀 Written input file (${(fileData.length/1048576).toFixed(2)} MB) to virtual FS`);
      
      // output name
      const outputName = "output_converted.mp4";
      
      // FFmpeg arguments: convert to H.264, AAC audio, faststart for streaming, good quality crf 23
      const ffArgs = [
        '-i', inputFileName,
        '-c:v', 'libx264',
        '-preset', 'medium',     // balance between speed/size
        '-crf', '23',
        '-c:a', 'aac',
        '-b:a', '128k',
        '-movflags', '+faststart',
        '-y',                    // overwrite output
        outputName
      ];
      
      addLog(`🎬 Running ffmpeg with args: ${ffArgs.join(' ')}`);
      setStatus("Converting ... (may take a while)");
      
      // run conversion
      await ffmpeg.run(...ffArgs);
      
      addLog(`✅ Conversion finished! Reading output file...`);
      // read output data
      const data = ffmpeg.FS('readFile', outputName);
      outputBlob = new Blob([data.buffer], { type: 'video/mp4' });
      const outSizeMB = (outputBlob.size / (1024 * 1024)).toFixed(2);
      addLog(`📦 Output MP4 size: ${outSizeMB} MB — ready for download`);
      
      // generate download filename based on original but .mp4
      let baseName = selectedFile.name.replace(/\.[^/.]+$/, "");
      if (baseName.length > 50) baseName = baseName.slice(0, 45);
      outputFilename = `${baseName}_converted.mp4`;
      
      // cleanup virtual files to free memory
      ffmpeg.FS('unlink', inputFileName);
      ffmpeg.FS('unlink', outputName);
      
      updateProgress(100, "Conversion complete!");
      setStatus("Conversion done! Click download to save MP4");
      downloadBtn.disabled = false;
      convertBtn.disabled = false;
      
      addLog(`🎉 Success! HEVC/H.265 → H.264 MP4 ready.`);
    } catch (err) {
      console.error("FFmpeg conversion error:", err);
      addLog(`❌ Conversion error: ${err.message || err}`, true);
      setStatus("Conversion failed — check logs for details", true);
      updateProgress(0, "Error");
      convertBtn.disabled = false;   // retry possible
    } finally {
      isConverting = false;
      // clean any leftover file references
      if (ffmpeg && ffmpegLoaded) {
        try {
          // ensure virtual files are removed if any leftover
          const filesToCheck = ['input_*', 'output_converted.mp4'];
        } catch(e) {}
      }
    }
  }
  
  // download generated blob
  function downloadMP4() {
    if (!outputBlob) {
      addLog("No converted file available. Please convert first.", true);
      return;
    }
    const link = document.createElement('a');
    const url = URL.createObjectURL(outputBlob);
    link.href = url;
    link.download = outputFilename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    addLog(`⬇️ Download started: ${outputFilename}`);
  }
  
  // Drag & Drop handlers
  function preventDefaults(e) {
    e.preventDefault();
    e.stopPropagation();
  }
  
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
  });
  
  dropZone.addEventListener('dragenter', () => {
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', (e) => {
    dropZone.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files && files.length > 0) {
      handleFile(files[0]);
    } else {
      addLog("Drop event without file", true);
    }
  });
  
  // click on dropzone triggers file input
  dropZone.addEventListener('click', (e) => {
    if (e.target === dropZone || e.target.closest('.dropzone') && !e.target.closest('.file-label')) {
      fileInput.click();
    }
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files.length > 0) {
      handleFile(e.target.files[0]);
    }
  });
  
  // buttons listeners
  convertBtn.addEventListener('click', async () => {
    if (!selectedFile) {
      setStatus("Please select a video file first", true);
      return;
    }
    if (isConverting) return;
    // ensure ffmpeg ready
    if (!ffmpegLoaded) {
      const ok = await initFFmpeg();
      if (!ok) return;
    }
    await startConversion();
  });
  
  downloadBtn.addEventListener('click', downloadMP4);
  clearLogsBtn.addEventListener('click', clearLogs);
  
  // preload ffmpeg on page load for better UX (quietly in background)
  (async function preloadFFmpeg() {
    try {
      addLog("🔄 Pre-loading FFmpeg core (background) ...");
      await initFFmpeg();
      addLog("🎬 FFmpeg ready — you can convert any HEVC / video now.");
      setStatus("FFmpeg engine ready. Select a video.");
    } catch (err) {
      addLog(`⚠️ Background preload warning: ${err.message}`, true);
      setStatus("Click convert to load FFmpeg", false);
    }
  })();
  
  // small extra: handle errors for large files & general resilience
  window.addEventListener('error', (ev) => {
    if (ev.message && ev.message.includes('ffmpeg')) {
      addLog(`Global error: ${ev.message}`, true);
    }
  });
  
  // initial status
  setStatus("Drop video or click to browse — HEVC to MP4");
  addLog("✨ Drag & drop HEVC / MOV / MKV files, convert to universal MP4 (H.264)");
</script>
</body>
</html>
